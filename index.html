<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free fire guild paid bot</title>
    <style>
        :root { --bg-color: #0b0b0b; --panel-bg: #111111; --card-bg: #1d1d1f; --accent-crimson: #ff1242; --accent-cyan: #00f0ff; --text-white: #ffffff; --text-grey: #a0a0a5; --border-grey: #2d2d30; --yt-red: #ff0000; --tg-blue: #0088cc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-white); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px 10px; }
        .phone-frame { width: 100%; max-width: 410px; background-color: #000000; border-radius: 8px; padding: 20px 16px; display: flex; flex-direction: column; min-height: 720px; position: relative; }
        .main-panel { background-color: var(--panel-bg); border-radius: 6px; padding: 20px 16px; flex-grow: 1; display: none; flex-direction: column; }
        .main-panel.active { display: flex; }
        .action-submit-btn, .btn-primary-forward { width: 100%; background-color: var(--accent-crimson); color: var(--text-white); border: none; border-radius: 4px; padding: 14px; font-size: 1.05rem; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: auto; }
        .form-text-field { width: 100%; background-color: var(--card-bg); border: 1px solid var(--border-grey); border-radius: 4px; padding: 12px; color: var(--text-white); margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div id="panel-stage1" class="main-panel active">
            <div class="section-title">Pack Selection</div>
            <button class="action-submit-btn" onclick="switchInterfaceStep(2)">Continue to Info</button>
        </div>

        <div id="panel-stage2" class="main-panel">
            <input type="text" id="guildUidInput" class="form-text-field" placeholder="Guild UID">
            <input type="text" id="guildNameInput" class="form-text-field" placeholder="Guild Name">
            <input type="text" id="guildLevelInput" class="form-text-field" placeholder="Guild Level">
            <input type="email" id="contactEmailInput" class="form-text-field" placeholder="Email">
            <button class="action-submit-btn" onclick="switchInterfaceStep(3)">Continue to Payment</button>
        </div>

        <div id="panel-stage3" class="main-panel">
            <input type="file" id="screenshot-attachment" accept="image/*">
            <button class="btn-primary-forward" onclick="finalizeGloryOrder()">I Have Paid</button>
        </div>

        <div class="social-redirect-dock">
            <a href="https://youtube.com/@gw_pathshala?si=8hnkqELaoYFxW0WD" class="yt-btn">YouTube 32k Subs</a>
            <a href="https://t.me/GwPathshala" class="tg-btn">Telegram</a>
        </div>
    </div>

    <script>
        function switchInterfaceStep(step) {
            document.querySelectorAll('.main-panel').forEach(p => p.style.display = 'none');
            document.getElementById('panel-stage' + step).style.display = 'flex';
        }

        // Yeh hai sahi aur simple function
        function finalizeGloryOrder() {
            const fileInput = document.getElementById('screenshot-attachment');
            if(!fileInput.files[0]) { alert("Screenshot upload karo!"); return; }

            const formData = new FormData();
            formData.append("Guild UID", document.getElementById('guildUidInput').value);
            formData.append("Guild Name", document.getElementById('guildNameInput').value);
            formData.append("Guild Level", document.getElementById('guildLevelInput').value);
            formData.append("Email", document.getElementById('contactEmailInput').value);
            formData.append("file", fileInput.files[0]);

            // FormSubmit backend connection
            fetch("https://formsubmit.co/ajax/Pandatkaran401@gmail.com", {
                method: "POST",
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                alert("Success! Order recorded.");
            })
            .catch(() => alert("Error, try again."));
        }
    </script>
</body>
</html>
