<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free fire guild paid bot</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --panel-bg: #111111;
            --card-bg: #1d1d1f;
            --accent-crimson: #ff1242;
            --accent-cyan: #00f0ff;
            --text-white: #ffffff;
            --text-grey: #a0a0a5;
            --border-grey: #2d2d30;
            --yt-red: #ff0000;
            --tg-blue: #0088cc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px 10px;
        }

        /* Phone Frame Core Layout */
        .phone-frame {
            width: 100%;
            max-width: 410px;
            background-color: #000000;
            border-radius: 8px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            min-height: 720px;
            position: relative;
        }

        /* Top Header Navigation */
        .top-nav {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .back-arrow {
            font-size: 1.4rem;
            color: var(--text-white);
            cursor: pointer;
            user-select: none;
        }

        .interface-title {
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        /* Section Title Indicators */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .vertical-indicator {
            width: 4px;
            height: 24px;
            background-color: var(--accent-cyan);
            border-radius: 2px;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            color: var(--accent-crimson);
            text-transform: uppercase;
        }

        /* Dynamic Screens Panel */
        .main-panel {
            background-color: var(--panel-bg);
            border-radius: 6px;
            padding: 20px 16px;
            flex-grow: 1;
            display: none;
            flex-direction: column;
        }

        .main-panel.active {
            display: flex;
        }

        /* YouTube Verification Card Block */
        .youtube-card {
            background-color: #1a080c;
            border: 1px solid rgba(255, 18, 66, 0.25);
            border-radius: 8px;
            padding: 14px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            text-decoration: none;
            color: inherit;
        }

        .youtube-avatar {
            width: 45px;
            height: 45px;
            background-color: var(--accent-crimson);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 18, 66, 0.4);
        }

        .channel-info h4 {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .channel-info p {
            font-size: 0.78rem;
            color: var(--text-grey);
            margin-top: 2px;
        }

        /* Selection Packages Box Style */
        .pack-option-box {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 18px 16px;
            margin-bottom: 16px;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .pack-option-box.selected {
            border: 1.5px solid var(--accent-crimson);
            box-shadow: 0 0 10px rgba(255, 18, 66, 0.1);
        }

        .pack-row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .pack-type-name { font-size: 1.15rem; font-weight: 700; }
        .pack-rate { font-size: 1.05rem; font-weight: 700; color: var(--accent-cyan); }

        .features-bullet-list { list-style: none; padding-left: 5px; }
        .features-bullet-list li {
            font-size: 0.85rem;
            color: var(--text-grey);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .features-bullet-list li::before { content: "•"; }

        .inner-select-btn {
            width: 100%;
            background-color: var(--accent-crimson);
            color: var(--text-white);
            border: none;
            padding: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            border-radius: 6px;
            margin-top: 10px;
            display: none;
        }

        .pack-option-box.selected .inner-select-btn { display: block; }

        .action-submit-btn {
            width: 100%;
            background-color: var(--accent-cyan);
            color: #000000;
            border: none;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            margin-top: auto;
        }

        /* Form Inputs Area */
        .input-block-group { margin-bottom: 16px; }
        .input-block-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-cyan);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.4px;
        }

        .input-block-group input {
            width: 100%;
            background-color: #050505;
            border: 1px solid var(--border-grey);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-white);
            font-size: 0.9rem;
        }

        .input-block-group input:focus { outline: none; border-color: var(--accent-cyan); }

        .dual-nav-row {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 12px;
            margin-top: auto;
        }

        .btn-secondary-back {
            background-color: #161618;
            border: 1px solid var(--border-grey);
            color: var(--text-white);
            padding: 14px;
            font-weight: 600;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-primary-forward {
            background-color: var(--accent-crimson);
            color: var(--text-white);
            border: none;
            padding: 14px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Payment Section Info Area */
        .summary-badge-box {
            background-color: var(--card-bg);
            border-radius: 6px;
            padding: 12px 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        .summary-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 4px; }
        .summary-amount { font-size: 0.85rem; font-weight: 700; color: var(--accent-cyan); }

        .qr-outer-container {
            background-color: #ffffff;
            padding: 12px;
            border-radius: 12px;
            display: inline-block;
            margin: 0 auto 12px auto;
            border: 3px solid var(--accent-cyan);
        }

        .qr-display-img { width: 175px; height: 175px; display: block; object-fit: contain; }
        .payment-caption { font-size: 0.72rem; color: var(--text-grey); text-transform: uppercase; margin-bottom: 15px; }

        /* Attachment Upload System */
        .screenshot-box-wrapper {
            border: 1px dashed rgba(0, 240, 255, 0.3);
            background: rgba(0, 240, 255, 0.02);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .screenshot-label-text {
            font-size: 0.75rem;
            color: var(--accent-cyan);
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
        }

        .custom-upload-trigger {
            display: inline-block;
            background: #222;
            border: 1px solid #333;
            color: #fff;
            padding: 6px 14px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
        }

        .img-preview-frame {
            margin-top: 8px;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .img-preview-frame img { max-width: 90px; border-radius: 4px; border: 1px solid var(--accent-crimson); }
        .cancel-btn-label { font-size: 0.8rem; color: #555558; text-transform: uppercase; font-weight: 600; margin-top: 12px; cursor: pointer; display: block; }

        /* Social Channels Quick Navigation Dock Boxes */
        .social-redirect-dock {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid #1a1a1a;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .social-link-block {
            border: 1px solid #222;
            background-color: #121214;
            border-radius: 8px;
            padding: 12px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .social-dot-indicator { width: 8px; height: 8px; border-radius: 50%; }
        .social-link-block.yt-btn { border-left: 3px solid var(--yt-red); }
        .social-link-block.yt-btn .social-dot-indicator { background-color: var(--yt-red); }

        .social-link-block.tg-btn { border-left: 3px solid var(--tg-blue); }
        .social-link-block.tg-btn .social-dot-indicator { background-color: var(--tg-blue); }

        /* Mobile Simulation Keys */
        .android-nav-strip {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 15px;
            padding-top: 5px;
        }

        .nav-vector-icon { width: 18px; height: 18px; border: 2px solid #333; border-radius: 2px; }
        .nav-vector-icon.circle { border-radius: 50%; }
        .nav-vector-icon.back {
            border: none; width: 0; height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-right: 12px solid #333;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        
        <div class="top-nav">
            <span class="back-arrow" onclick="navigateFlowDecrement()">←</span>
            <div class="interface-title" id="mainHeaderTitle">Free fire guild paid bot</div>
        </div>

        <div class="main-panel active" id="panel-stage1">
            <div class="section-header">
                <div class="vertical-indicator"></div>
                <div class="section-title">Pack Selection</div>
            </div>

            <a href="https://youtube.com/@gw_pathshala?si=8hnkqELaoYFxW0WD" target="_blank" class="youtube-card">
                <div class="youtube-avatar">GW</div>
                <div class="channel-info">
                    <h4>GW Pathshala Official</h4>
                    <p>32k Subscribers</p>
                </div>
            </a>

            <div class="pack-option-box" id="box-normal" onclick="pickPlanData('Normal', '239')">
                <div class="pack-row-header">
                    <span class="pack-type-name">Normal</span>
                    <span class="pack-rate">239 INR</span>
                </div>
                <ul class="features-bullet-list">
                    <li>Standard Bot Speed</li>
                    <li>Monthly Access</li>
                    <li>Email Support</li>
                </ul>
                <button class="inner-select-btn">Selected</button>
            </div>

            <div class="pack-option-box selected" id="box-pro" onclick="pickPlanData('Pro Bot', '450')">
                <div class="pack-row-header">
                    <span class="pack-type-name">Pro Bot</span>
                    <span class="pack-rate">450 INR</span>
                </div>
                <ul class="features-bullet-list">
                    <li>High Priority Processing</li>
                    <li>Lifetime Access</li>
                    <li>24/7 Support</li>
                    <li>Custom Tags</li>
                </ul>
                <button class="inner-select-btn">Selected</button>
            </div>

            <button class="action-submit-btn" onclick="switchInterfaceStep(2)">Continue to Info</button>
        </div>

        <div class="main-panel" id="panel-stage2">
            <div class="section-header">
                <div class="vertical-indicator"></div>
                <div class="section-title">User Info</div>
            </div>

            <div class="input-block-group">
                <label>Guild UID</label>
                <input type="text" id="guildUidInput" placeholder="e.g. 1002345678">
            </div>

            <div class="input-block-group">
                <label>Guild Name</label>
                <input type="text" id="guildNameInput" placeholder="e.g. Team Alpha">
            </div>

            <div class="input-block-group">
                <label>Guild Level</label>
                <input type="number" id="guildLevelInput" placeholder="e.g. 4">
            </div>

            <div class="input-block-group">
                <label>Contact Email</label>
                <input type="email" id="contactEmailInput" placeholder="e.g. player@mail.com">
            </div>

            <div class="dual-nav-row">
                <button class="btn-secondary-back" onclick="switchInterfaceStep(1)">Back</button>
                <button class="btn-primary-forward" onclick="processAndVerifyInfo()">Payment</button>
            </div>
        </div>

        <div class="main-panel" id="panel-stage3" style="text-align: center;">
            <div class="section-header" style="text-align: left;">
